<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Davinci Space - Events</title>
  <link rel="stylesheet" href="./components/community-admin-layout.css">
  <link rel="stylesheet" href="./components/community-map.css">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .page {
      min-height: 100vh;
      position: relative;
      isolation: isolate;
    }

    @keyframes davinciScanDown {
      0% {
        transform: translateY(-80%);
      }

      100% {
        transform: translateY(100%);
      }
    }

    .davinci-side {
      position: fixed;
      top: 0;
      bottom: 0;
      width: min(24vw, 300px);
      pointer-events: none;
      z-index: 0;
      isolation: isolate;
      overflow: hidden;
    }

    .davinci-side::before,
    .davinci-side::after {
      content: "";
      position: absolute;
      inset: 0;
    }

    .davinci-side::before {
      background-image: url("./assets/background.png");
      background-repeat: no-repeat;
      background-size: cover;
      background-position: inherit;
      opacity: 0.5;
      z-index: 0;
    }

    .davinci-side::after {
      top: 0;
      left: 0;
      width: 68%;
      height: 80%;
      background: linear-gradient(to bottom,
          rgba(255, 255, 255, 0) 0%,
          rgba(201, 162, 79, 0.12) 18%,
          rgba(201, 162, 79, 0.28) 50%,
          rgba(201, 162, 79, 0.1) 82%,
          rgba(255, 255, 255, 0) 100%);
      opacity: 0.5;
      animation: davinciScanDown 4s ease-in-out infinite;
      z-index: 1;
    }

    .davinci-side.left {
      left: 0;
      mask-image: linear-gradient(to right, rgba(0, 0, 0, 1), rgba(0, 0, 0, 0));
      -webkit-mask-image: linear-gradient(to right, rgba(0, 0, 0, 1), rgba(0, 0, 0, 0));
    }

    .davinci-side.left::before {
      background-position: left center;
    }

    .davinci-side.right {
      right: 0;
      mask-image: linear-gradient(to left, rgba(0, 0, 0, 1), rgba(0, 0, 0, 0));
      -webkit-mask-image: linear-gradient(to left, rgba(0, 0, 0, 1), rgba(0, 0, 0, 0));
    }

    .davinci-side.right::before {
      background-position: right center;
    }

    .davinci-side.right::after {
      left: auto;
      right: 0;
      animation-delay: 2.6s;
    }

    .topbar,
    .subnav {
      position: relative;
      z-index: 1;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(245, 241, 232, 0.92);
      backdrop-filter: blur(12px);
      transition: background 220ms ease, box-shadow 220ms ease;
    }

    .topbar.is-compact {
      background: rgba(245, 241, 232, 0.86);
      box-shadow: 0 10px 24px rgba(24, 57, 43, 0.08);
    }

    .topbar-inner {
      max-width: var(--container);
      margin: 0 auto;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: padding 220ms ease, gap 220ms ease;
    }

    .topbar.is-compact .topbar-inner {
      padding-top: 8px;
      padding-bottom: 8px;
      gap: 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .brand-mark {
      height: 40px;
      object-fit: contain;
      transition: height 220ms ease;
    }

    .topbar.is-compact .brand-mark {
      height: 30px;
    }

    .brand-copy {
      display: flex;
      align-items: center;
      min-height: 40px;
    }

    .brand-title {
      font-weight: 800;
      letter-spacing: 0;
      font-size: 1.08rem;
      line-height: 1;
      color: var(--brand);
      transition: font-size 220ms ease;
    }

    .topbar.is-compact .brand-title {
      font-size: 0.96rem;
    }

    .subnav {
      border-bottom: 1px solid rgba(211, 193, 154, 0.65);
      background: rgba(245, 241, 232, 0.72);
      backdrop-filter: blur(10px);
    }

    .subnav-inner {
      max-width: var(--container);
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      gap: 20px;
      overflow-x: auto;
    }

    .subnav-link {
      position: relative;
      padding: 11px 2px 10px;
      color: var(--text-soft);
      font-weight: 600;
      white-space: nowrap;
    }

    .subnav-link.active {
      color: var(--brand);
      font-weight: 800;
    }

    .subnav-link.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      border-radius: 999px;
      background: var(--brand);
    }

    .events-panel {
      display: none;
    }

    .events-panel.is-active {
      display: grid;
      gap: 18px;
    }

    .events-content.is-feed-layout {
      padding: 0;
      min-height: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .events-content.is-hidden,
    .event-shell.is-hidden {
      display: none;
    }

    .event-menu-logo {
      display: none;
      width: 100%;
      margin: -4px 0 18px;
      text-align: center;
    }

    .event-menu-logo img {
      width: min(100%, 180px);
      max-height: 122px;
      object-fit: contain;
      object-position: center;
      margin: 0 auto;
    }

    .event-menu-logo.is-visible {
      display: block;
    }

    .event-menu-title {
      text-align: center;
      margin-bottom: 16px;
    }

    .events-menu-item {
      justify-content: space-between;
      gap: 12px;
    }

    .events-menu-item-label {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .events-menu-item-label svg {
      margin-right: 0;
    }

    .events-menu-badge {
      min-width: 28px;
      height: 28px;
      padding: 0 9px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(201, 162, 79, 0.14);
      color: var(--brand);
      font-size: 0.82rem;
      font-weight: 800;
      line-height: 1;
    }

    .menu-card .ui-cta-button.menu-item.is-active .events-menu-badge {
      background: rgba(23, 61, 45, 0.1);
    }

    .event-row {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: rgba(255, 253, 248, 0.96);
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
      display: grid;
      align-items: center;
      gap: 16px;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .event-row {
      grid-template-columns: 108px minmax(0, 1fr);
    }

    .event-row:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(24, 57, 43, 0.08);
      background: var(--surface);
    }

    .events-row-media {
      width: 108px;
      aspect-ratio: 4 / 3;
      border: 1px solid rgba(211, 193, 154, 0.78);
      border-radius: var(--radius);
      background: rgba(245, 241, 232, 0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .events-row-media img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
    }

    .events-row-media.is-placeholder svg {
      width: 34px;
      height: 34px;
      color: var(--muted);
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .events-row-body {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .events-row-header,
    .quest-detail-topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .event-row strong {
      color: var(--brand);
      font-size: 1rem;
      line-height: 1.35;
    }

    .events-row-copy,
    .events-rule p,
    .events-list-item p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.55;
    }

    .events-rule-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .event-feed-panel {
      display: grid;
      gap: 18px;
    }

    .event-join-ribbon {
      min-height: 50px;
      padding: 12px 16px;
      border-radius: 18px;
      border: 1px solid rgba(201, 162, 79, 0.34);
      background: linear-gradient(90deg, rgba(201, 162, 79, 0.18), rgba(255, 253, 248, 0.96));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .event-join-ribbon-copy {
      min-width: 0;
      color: var(--brand);
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .action-guide {
      padding: 0;
      overflow: hidden;
    }

    .action-guide-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(227, 215, 191, 0.9);
    }

    .action-guide-head-main {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .action-guide-ring {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex: 0 0 auto;
      position: relative;
      background: conic-gradient(var(--brand-2) 0 50%, rgba(23, 61, 45, 0.14) 50% 100%);
    }

    .action-guide-ring::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: inherit;
      background: var(--surface);
    }

    .action-guide-title {
      margin: 0;
      color: var(--brand);
      font-size: 1.08rem;
      line-height: 1.2;
      font-weight: 700;
    }

    .action-guide-list,
    .event-activity-list {
      display: grid;
    }

    .action-guide-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(227, 215, 191, 0.9);
    }

    .action-guide-item:last-child {
      border-bottom: 0;
    }

    .action-guide-status {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(23, 61, 45, 0.34);
      background: transparent;
      color: transparent;
    }

    .action-guide-status.done {
      border-color: var(--brand-2);
      background: var(--brand-2);
      color: var(--brand);
    }

    .action-guide-status svg,
    .event-activity-icon svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .action-guide-link {
      color: var(--brand);
      font-size: 0.98rem;
      font-weight: 500;
      text-decoration: none;
      line-height: 1.35;
    }

    .action-guide-link:hover {
      text-decoration: underline;
    }

    .event-feed-section-title {
      margin: 4px 0 0;
      color: var(--text-muted);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .event-activity-list {
      gap: 12px;
    }

    .event-activity-card {
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: rgba(255, 253, 248, 0.96);
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .event-activity-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(201, 162, 79, 0.14);
      color: var(--brand);
    }

    .event-activity-copy {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .event-activity-copy strong {
      color: var(--brand);
      font-size: 1rem;
      line-height: 1.35;
    }

    .event-activity-copy p,
    .event-activity-meta {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.55;
    }

    .event-activity-meta {
      font-size: 0.86rem;
      font-weight: 700;
    }

    .event-member-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid rgba(23, 61, 45, 0.12);
      background: rgba(23, 61, 45, 0.08);
      color: var(--brand);
      font-size: 0.88rem;
      font-weight: 800;
    }

    .event-member-chip::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--brand-2);
      box-shadow: 0 0 0 4px rgba(201, 162, 79, 0.16);
    }

    .event-about-panel {
      display: grid;
      gap: 24px;
    }

    .event-about-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .event-about-copy {
      display: grid;
      gap: 14px;
      max-width: 920px;
    }

    .event-about-copy h1,
    .event-about-copy p {
      margin: 0;
    }

    .event-about-copy h1 {
      color: var(--brand);
      font-size: clamp(2rem, 3.3vw, 2.6rem);
      line-height: 1.02;
      letter-spacing: -0.03em;
    }

    .event-about-copy p {
      color: var(--text-soft);
      font-size: 1.05rem;
      line-height: 1.65;
    }

    .event-about-schedule {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 2px;
    }

    .event-about-schedule span {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(201, 162, 79, 0.12);
      color: var(--brand);
      font-size: 0.88rem;
      font-weight: 700;
    }

    .event-about-gallery {
      display: grid;
      gap: 14px;
    }

    .event-about-hero {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 28px;
      overflow: hidden;
      background: rgba(245, 241, 232, 0.88);
      border: 1px solid rgba(211, 193, 154, 0.78);
      box-shadow: 0 18px 40px rgba(24, 57, 43, 0.1);
    }

    .event-about-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .event-about-thumbs {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .event-about-thumb {
      width: 92px;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(211, 193, 154, 0.78);
      background: rgba(245, 241, 232, 0.82);
      box-shadow: 0 10px 22px rgba(24, 57, 43, 0.08);
    }

    .event-about-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .events-rule,
    .events-list-item {
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: rgba(251, 248, 242, 0.7);
    }

    .events-rule strong,
    .events-list-item strong {
      display: block;
      margin-bottom: 7px;
      color: var(--brand);
      font-size: 1rem;
    }

    .quest-overview {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 1px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .quest-overview-item {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .quest-overview-item strong {
      color: var(--brand);
      font-size: 1rem;
    }

    .quest-overview-item p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.6;
    }

    .quest-overview-divider {
      width: 1px;
      min-height: 100%;
      background: rgba(227, 215, 191, 0.96);
    }

    .quest-meta-section {
      display: grid;
      gap: 14px;
    }

    .quest-meta-section strong {
      color: var(--brand);
      font-size: 1rem;
    }

    .quest-meta-copy {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.6;
    }

    .quest-checkpoint-action {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .quest-checkpoint-action strong {
      color: var(--brand);
      font-size: 0.96rem;
    }

    .quest-checkpoint-action p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.55;
    }

    .quest-checkpoint-action .quest-location-link {
      width: fit-content;
      justify-self: start;
    }

    .quest-solve-panel {
      display: grid;
      gap: 18px;
    }

    .quest-solve-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .quest-solve-head strong {
      display: block;
      margin: 0 0 6px;
      color: var(--brand);
      font-size: 1.02rem;
    }

    .quest-solve-head p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.6;
    }

    .quest-solve-kicker {
      margin: 0 0 8px;
      color: var(--text-muted);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .quest-solve-status {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(201, 162, 79, 0.14);
      color: var(--brand);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .quest-detail-divider {
      height: 1px;
      background: rgba(227, 215, 191, 0.96);
    }

    .quest-solve-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .quest-solve-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .quest-solve-card {
      padding: 14px 0 2px;
      display: grid;
      gap: 10px;
      align-content: start;
      position: relative;
    }

    .quest-solve-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(227, 215, 191, 0.96);
    }

    .quest-solve-card strong {
      color: var(--brand);
      font-size: 0.96rem;
    }

    .quest-solve-card p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.55;
    }

    .quest-solve-upload,
    .quest-solve-field {
      display: grid;
      gap: 8px;
    }

    .quest-solve-upload input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .quest-solve-upload-trigger,
    .quest-solve-field-value {
      min-height: 44px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(211, 193, 154, 0.88);
      background: rgba(255, 253, 248, 0.96);
      color: var(--text);
      font: inherit;
      line-height: 1.45;
    }

    .quest-solve-upload-trigger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--brand);
      cursor: pointer;
    }

    .quest-solve-file {
      display: none;
      color: var(--text-muted);
      font-size: 0.88rem;
      font-weight: 600;
    }

    .quest-solve-file.is-visible {
      display: block;
    }

    .quest-solve-preview {
      display: none;
      width: 100%;
      max-width: 240px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(211, 193, 154, 0.88);
      background: rgba(255, 253, 248, 0.96);
      box-shadow: 0 10px 22px rgba(24, 57, 43, 0.08);
    }

    .quest-solve-preview.is-visible {
      display: block;
    }

    .quest-solve-preview img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    .quest-solve-submit[aria-disabled="true"] {
      opacity: 0.72;
      pointer-events: none;
    }

    .quest-solve-submit {
      width: fit-content;
      justify-self: start;
    }

    .quest-solve-note {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .quest-step {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      color: var(--text-muted);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .quest-step::before {
      content: attr(data-step);
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(201, 162, 79, 0.16);
      color: var(--brand);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .events-list {
      display: grid;
      gap: 12px;
    }

    .events-list-meta {

        day: "numeric",
        year: "numeric",
        hour: "2-digit",

        return Array.from({ length: totalPages }, (_, index) => index + 1);

      if (page <= 3) {
        return [1, 2, 3, "...", totalPages];
      }

      const pageSize = 8;

      const renderPlayersTable = () => {
        const query = playerSearch.value.trim().toLowerCase();
        const filteredPlayers = event.players.filter((player) =>
          (player.email || "").toLowerCase().includes(query) ||
          (player.name || "").toLowerCase().includes(query)
        );
        const totalPages = Math.max(1, Math.ceil(filteredPlayers.length / pageSize));

        if (currentPage > totalPages) {
          currentPage = totalPages;
        }

        const start = (currentPage - 1) * pageSize;
        const visiblePlayers = filteredPlayers.slice(start, start + pageSize);

        playersTableBody.innerHTML = visiblePlayers.length

          row.addEventListener("click", () => {
            window.location.hash = `event/${event.id}/players/${row.dataset.playerId}`;

        const navButton = eventClick.target.closest("[data-page-nav]");

        if (pageButton) {

          renderPlayersTable();
          return;

    const bindSelectedQuestPanel = () => {
      const proofInput = eventContentView.querySelector("[data-selected-quest-proof-input]");
      const proofFile = eventContentView.querySelector("[data-selected-quest-proof-file]");
      const proofPreview = eventContentView.querySelector("[data-selected-quest-proof-preview]");
      const proofImage = eventContentView.querySelector("[data-selected-quest-proof-image]");
      const submitButton = eventContentView.querySelector("[data-selected-quest-submit]");
      const note = eventContentView.querySelector("[data-selected-quest-note]");
      let previewUrl = "";

      proofInput?.addEventListener("change", () => {
        const file = proofInput.files && proofInput.files[0];
        if (proofFile) {
          proofFile.textContent = file ? file.name : "";
          proofFile.classList.toggle("is-visible", Boolean(file));
        }
        if (previewUrl) {
          URL.revokeObjectURL(previewUrl);
          previewUrl = "";
        }
        if (proofPreview && proofImage) {
          if (file) {
            previewUrl = URL.createObjectURL(file);
            proofImage.src = previewUrl;
            proofPreview.classList.add("is-visible");
          } else {
            proofImage.removeAttribute("src");
            proofPreview.classList.remove("is-visible");
          }
        }
        if (submitButton) {
          submitButton.setAttribute("aria-disabled", file ? "false" : "true");
        }
      });

      if (submitButton) {
        submitButton.setAttribute("aria-disabled", "true");
        submitButton.addEventListener("click", () => {
          if (submitButton.getAttribute("aria-disabled") === "true") return;
          submitButton.textContent = "Submitted";

          if (note) {
            note.textContent = "Proof submitted. The quest is now waiting for review.";

        });
      }
    };

            window.location.hash = `event/${event.id}/players`;
          });
          return;
        }

        eventContentView.innerHTML = renderPlayers(event);
        bindJoinEventAction();
        bindPlayersTable(event);
        return;
      }

      if (activeTab === "locations") {
        if (detailId) {
          const location = getLocation(event, detailId);
          const locationView = subView === "map" ? "map" : "list";

          if (locationView === "map") {
            eventContentView.innerHTML = renderLocationMap(event, location);
            eventContentView.querySelector("[data-back-to-location]")?.addEventListener("click", () => {
              window.location.hash = `event/${event.id}/locations/${location.id}`;
            });
            eventContentView.querySelectorAll("[data-location-quest-id]").forEach((row) => {
              row.addEventListener("click", () => {
                window.location.hash = `event/${event.id}/quests/${row.dataset.locationQuestId}`;
              });
            });
            DavinciCommunityMap.init(eventContentView);
            return;
          }

          eventContentView.innerHTML = renderLocationDetail(event, location, locationView);
          eventContentView.querySelector("[data-back-to-locations]")?.addEventListener("click", () => {
            window.location.hash = `event/${event.id}/locations`;
          });
          eventContentView.querySelectorAll("[data-location-view]").forEach((button) => {
            button.addEventListener("click", () => {
              const nextView = button.dataset.locationView;
              window.location.hash = nextView === "map"
                ? `event/${event.id}/locations/${location.id}/map`
                : `event/${event.id}/locations/${location.id}`;
            });
          });
          eventContentView.querySelectorAll("[data-location-quest-id]").forEach((row) => {
            row.addEventListener("click", () => {
              window.location.hash = `event/${event.id}/quests/${row.dataset.locationQuestId}`;
            });
          });
          return;
        }

        eventContentView.innerHTML = renderLocations(event);
        eventContentView.querySelectorAll("[data-location-id]").forEach((row) => {
          row.addEventListener("click", () => {
            window.location.hash = `event/${event.id}/locations/${row.dataset.locationId}`;
          });
        });
        return;
      }

      eventContentView.innerHTML = renderAbout(event);
      bindJoinEventAction();
    };

    const renderRoute = () => {
      const parts = window.location.hash.replace(/^#/, "").split("/").filter(Boolean);
      if (parts[0] !== "event") {
        renderEventsList();
        return;
      }

      const event = getEvent(parts[1]);
      renderEventDetail(event, parts[2] || "feed", parts[3], parts[4]);
    };

    syncTopbarState();
    window.addEventListener("scroll", syncTopbarState, { passive: true });
    window.addEventListener("hashchange", renderRoute);
    renderRoute();
  </script>
</body>

</html>
