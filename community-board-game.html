<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Davinci Space - Events</title>
  <link rel="stylesheet" href="./components/community-admin-layout.css">
  <link rel="stylesheet" href="./components/community-map.css">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .page {
      min-height: 100vh;
      position: relative;
      isolation: isolate;
    }

    @keyframes davinciScanDown {
      0% {
        transform: translateY(-80%);
      }

      100% {
        transform: translateY(100%);
      }
    }

    .davinci-side {
      position: fixed;
      top: 0;
      bottom: 0;
      width: min(24vw, 300px);
      pointer-events: none;
      z-index: 0;
      isolation: isolate;
      overflow: hidden;
    }

    .davinci-side::before,
    .davinci-side::after {
      content: "";
      position: absolute;
      inset: 0;
    }

    .davinci-side::before {
      background-image: url("./assets/background.png");
      background-repeat: no-repeat;
      background-size: cover;
      background-position: inherit;
      opacity: 0.5;
      z-index: 0;
    }

    .davinci-side::after {
      top: 0;
      left: 0;
      width: 68%;
      height: 80%;
      background: linear-gradient(to bottom,
          rgba(255, 255, 255, 0) 0%,
          rgba(201, 162, 79, 0.12) 18%,
          rgba(201, 162, 79, 0.28) 50%,
          rgba(201, 162, 79, 0.1) 82%,
          rgba(255, 255, 255, 0) 100%);
      opacity: 0.5;
      animation: davinciScanDown 4s ease-in-out infinite;
      z-index: 1;
    }

    .davinci-side.left {
      left: 0;
      mask-image: linear-gradient(to right, rgba(0, 0, 0, 1), rgba(0, 0, 0, 0));
      -webkit-mask-image: linear-gradient(to right, rgba(0, 0, 0, 1), rgba(0, 0, 0, 0));
    }

    .davinci-side.left::before {
      background-position: left center;
    }

    .davinci-side.right {
      right: 0;
      mask-image: linear-gradient(to left, rgba(0, 0, 0, 1), rgba(0, 0, 0, 0));
      -webkit-mask-image: linear-gradient(to left, rgba(0, 0, 0, 1), rgba(0, 0, 0, 0));
    }

    .davinci-side.right::before {
      background-position: right center;
    }

    .davinci-side.right::after {
      left: auto;
      right: 0;
      animation-delay: 2.6s;
    }

    .topbar,
    .subnav {
      position: relative;
      z-index: 1;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(245, 241, 232, 0.92);
      backdrop-filter: blur(12px);
      transition: background 220ms ease, box-shadow 220ms ease;
    }

    .topbar.is-compact {
      background: rgba(245, 241, 232, 0.86);
      box-shadow: 0 10px 24px rgba(24, 57, 43, 0.08);
    }

    .topbar-inner {
      max-width: var(--container);
      margin: 0 auto;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: padding 220ms ease, gap 220ms ease;
    }

    .topbar.is-compact .topbar-inner {
      padding-top: 8px;
      padding-bottom: 8px;
      gap: 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .brand-mark {
      height: 40px;
      object-fit: contain;
      transition: height 220ms ease;
    }

    .topbar.is-compact .brand-mark {
      height: 30px;
    }

    .brand-copy {
      display: flex;
      align-items: center;
      min-height: 40px;
    }

    .brand-title {
      font-weight: 800;
      letter-spacing: 0;
      font-size: 1.08rem;
      line-height: 1;
      color: var(--brand);
      transition: font-size 220ms ease;
    }

    .topbar.is-compact .brand-title {
      font-size: 0.96rem;
    }

    .subnav {
      border-bottom: 1px solid rgba(211, 193, 154, 0.65);
      background: rgba(245, 241, 232, 0.72);
      backdrop-filter: blur(10px);
    }

    .subnav-inner {
      max-width: var(--container);
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      gap: 20px;
      overflow-x: auto;
    }

    .subnav-link {
      position: relative;
      padding: 11px 2px 10px;
      color: var(--text-soft);
      font-weight: 600;
      white-space: nowrap;
    }

    .subnav-link.active {
      color: var(--brand);
      font-weight: 800;
    }

    .subnav-link.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      border-radius: 999px;
      background: var(--brand);
    }

    .events-panel {
      display: none;
    }

    .events-panel.is-active {
      display: grid;
      gap: 18px;
    }

    .events-content.is-hidden,
    .event-shell.is-hidden {
      display: none;
    }

    .event-menu-logo {
      display: none;
      width: 100%;
      margin: -4px 0 18px;
      text-align: center;
    }

    .event-menu-logo img {
      width: min(100%, 180px);
      max-height: 122px;
      object-fit: contain;
      object-position: center;
      margin: 0 auto;
    }

    .event-menu-logo.is-visible {
      display: block;
    }

    .event-menu-title {
      text-align: center;
      margin-bottom: 16px;
    }

    .event-row {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: rgba(255, 253, 248, 0.96);
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
      display: grid;
      align-items: center;
      gap: 16px;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .event-row {
      grid-template-columns: 108px minmax(0, 1fr);
    }

    .event-row:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(24, 57, 43, 0.08);
      background: var(--surface);
    }

    .events-row-media {
      width: 108px;
      aspect-ratio: 4 / 3;
      border: 1px solid rgba(211, 193, 154, 0.78);
      border-radius: var(--radius);
      background: rgba(245, 241, 232, 0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .events-row-media img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
    }

    .events-row-media.is-placeholder svg {
      width: 34px;
      height: 34px;
      color: var(--muted);
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .events-row-body {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .events-row-header,
    .quest-detail-topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .event-row strong {
      color: var(--brand);
      font-size: 1rem;
      line-height: 1.35;
    }

    .events-row-copy,
    .events-rule p,
    .events-list-item p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.55;
    }

    .events-rule-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .event-about-panel {
      display: grid;
      gap: 24px;
    }

    .event-about-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .event-about-copy {
      display: grid;
      gap: 14px;
      max-width: 920px;
    }

    .event-about-copy h1,
    .event-about-copy p {
      margin: 0;
    }

    .event-about-copy h1 {
      color: var(--brand);
      font-size: clamp(2rem, 3.3vw, 2.6rem);
      line-height: 1.02;
      letter-spacing: -0.03em;
    }

    .event-about-copy p {
      color: var(--text-soft);
      font-size: 1.05rem;
      line-height: 1.65;
    }

    .event-about-schedule {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 2px;
    }

    .event-about-schedule span {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(201, 162, 79, 0.12);
      color: var(--brand);
      font-size: 0.88rem;
      font-weight: 700;
    }

    .event-about-gallery {
      display: grid;
      gap: 14px;
    }

    .event-about-hero {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 28px;
      overflow: hidden;
      background: rgba(245, 241, 232, 0.88);
      border: 1px solid rgba(211, 193, 154, 0.78);
      box-shadow: 0 18px 40px rgba(24, 57, 43, 0.1);
    }

    .event-about-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .event-about-thumbs {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .event-about-thumb {
      width: 92px;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(211, 193, 154, 0.78);
      background: rgba(245, 241, 232, 0.82);
      box-shadow: 0 10px 22px rgba(24, 57, 43, 0.08);
    }

    .event-about-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .events-rule,
    .events-list-item {
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: rgba(251, 248, 242, 0.7);
    }

    .events-rule strong,
    .events-list-item strong {
      display: block;
      margin-bottom: 7px;
      color: var(--brand);
      font-size: 1rem;
    }

    .events-list {
      display: grid;
      gap: 12px;
    }

    .events-list-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      color: var(--text-soft);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .events-row-header .events-list-meta {
      justify-content: flex-end;
      margin-top: 0;
      flex: 1 1 260px;
    }

    .events-list-meta span {
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(201, 162, 79, 0.12);
    }

    .events-back {
      justify-self: start;
    }

    .location-detail-panel {
      display: grid;
      gap: 18px;
    }

    .location-detail-tabs {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .location-detail-tab {
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid rgba(211, 193, 154, 0.78);
      background: rgba(255, 253, 248, 0.88);
      color: var(--text-soft);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease, border-color 140ms ease, transform 140ms ease;
    }

    .location-detail-tab:hover {
      transform: translateY(-1px);
      border-color: rgba(201, 162, 79, 0.72);
    }

    .location-detail-tab.is-active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    .event-table.location-detail-quests-table .event-table-head,
    .event-table.location-detail-quests-table .event-table-row {
      grid-template-columns: minmax(220px, 1.2fr) 110px 110px;
    }

    .search-row {
      display: flex;
      justify-content: flex-start;
    }

    .search-shell {
      width: min(560px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 45px;
    }

    .search-shell svg {
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      flex: 0 0 auto;
      stroke: currentColor;
    }

    .search-shell input {
      flex: 1;
      border: 0;
      outline: 0;
      background: transparent;
      font-size: 1rem;
      color: var(--text);
    }

    .search-shell input::placeholder {
      color: #9aa59f;
    }

    .event-players-table {
      display: grid;
      gap: 8px;
      align-content: start;
      min-width: 620px;
    }

    .event-players-table-head,
    .event-players-table-row {
      display: grid;
      grid-template-columns: 52px minmax(220px, 1.2fr) minmax(180px, 1fr) 110px;
      align-items: center;
      gap: 14px;
    }

    .event-players-table-head {
      padding: 0 10px 8px;
      border-bottom: 1px solid rgba(227, 215, 191, 0.9);
      color: var(--text-muted);
      font-size: 0.83rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .event-players-table-head> :first-child {
      color: transparent;
      user-select: none;
    }

    .event-players-table-body {
      display: grid;
      gap: 4px;
      align-content: start;
    }

    .event-players-table-row {
      padding: 8px 10px;
      border-radius: 18px;
      background: rgba(255, 253, 248, 0.96);
    }

    .event-players-table-row:nth-child(even) {
      background: #f9f5ec;
    }

    .event-player-email,
    .event-player-name,
    .event-player-points {
      min-width: 0;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .event-player-email {
      word-break: break-word;
    }

    .event-player-name {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .event-player-points {
      text-align: right;
    }

    .event-table-empty {
      padding: 26px 18px;
      border-radius: 18px;
      border: 1px dashed rgba(211, 193, 154, 0.9);
      background: linear-gradient(180deg, rgba(251, 248, 242, 0.88), rgba(247, 242, 231, 0.76));
      color: var(--text-soft);
      text-align: center;
      line-height: 1.6;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pagination-btn,
    .pagination-page {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid rgba(201, 162, 79, 0.32);
      background: rgba(201, 162, 79, 0.14);
      color: var(--brand);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
    }

    .pagination-btn:hover,
    .pagination-page:hover {
      background: rgba(201, 162, 79, 0.22);
      border-color: rgba(201, 162, 79, 0.52);
    }

    .pagination-page.active {
      background: var(--brand-2);
      border-color: var(--brand-2);
      color: #fff;
    }

    .pagination-btn[disabled] {
      opacity: 0.5;
      cursor: default;
    }

    .pagination-dots {
      padding: 0 4px;
      color: var(--text-muted);
      font-weight: 700;
    }

    .quest-details-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .event-join-button[disabled] {
      opacity: 0.76;
      cursor: default;
    }

    .event-table {
      display: grid;
      gap: 8px;
      align-content: start;
      min-width: 620px;
    }

    .event-table-scroll {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
    }

    .event-table-head,
    .event-table-row {
      display: grid;
      align-items: center;
      gap: 14px;
    }

    .event-table.players-table .event-table-head,
    .event-table.players-table .event-table-row {
      grid-template-columns: 52px minmax(220px, 1.2fr) minmax(180px, 1fr);
    }

    .event-table.quests-table .event-table-head,
    .event-table.quests-table .event-table-row {
      grid-template-columns: minmax(210px, 1.2fr) minmax(170px, 1fr) 110px 110px;
    }

    .event-table.locations-table .event-table-head,
    .event-table.locations-table .event-table-row {
      grid-template-columns: minmax(220px, 1fr) 110px;
    }

    .event-table-head {
      padding: 0 10px 8px;
      border-bottom: 1px solid rgba(227, 215, 191, 0.9);
      color: var(--text-muted);
      font-size: 0.83rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .players-table .event-table-head> :first-child {
      color: transparent;
      user-select: none;
    }

    .event-table-body {
      display: grid;
      gap: 4px;
      align-content: start;
    }

    .event-table-row {
      padding: 8px 10px;
      border-radius: var(--radius-lg);
      background: rgba(255, 253, 248, 0.96);
      color: inherit;
      font: inherit;
      text-align: left;
      border: 0;
    }

    .event-table-row:nth-child(even) {
      background: #f9f5ec;
    }

    .event-table-row.is-clickable {
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .event-table-row.is-clickable:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(24, 57, 43, 0.08);
      background: var(--surface);
    }

    .event-map-shell {
      display: block;
      min-height: calc(100vh - 101px);
    }

    .event-map-scroll {
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 101px);
      overflow: hidden;
      scrollbar-width: none;
      border: 0;
      border-radius: 0;
      background: #7fb7e8;
      box-shadow: none;
      -webkit-overflow-scrolling: touch;
    }

    .event-map-scroll::-webkit-scrollbar {
      display: none;
    }

    .event-map-scroll .map-stage {
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    .event-map-scroll .map-note {
      bottom: 16px;
      left: 16px;
    }

    .event-map-logo {
      position: absolute;
      top: 74px;
      left: 16px;
      z-index: 7;
      width: min(180px, 28vw);
      max-height: 110px;
      padding: 8px;
      border-radius: var(--radius);
      border: 1px solid rgba(227, 215, 191, 0.74);
      box-shadow: 0 14px 28px rgba(24, 57, 43, 0.14);
      object-fit: contain;
      pointer-events: none;
    }

    .event-map-scroll .back-to-europe {
      top: 16px;
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .events-view.is-map-screen {
      max-width: none;
      padding: 0;
    }

    .event-shell.is-map-screen {
      display: block;
    }

    .event-shell.is-map-screen .menu-card {
      display: none;
    }

    .event-shell.is-map-screen .content-card {
      padding: 0;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      background: transparent;
    }

    .player-card-image {
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      object-fit: cover;
      border: 1px solid rgba(227, 215, 191, 0.9);
      box-shadow: var(--shadow);
    }

    .event-table-text,
    .event-table-primary,
    .player-email,
    .player-name {
      min-width: 0;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .event-table-text,
    .player-email {
      word-break: break-word;
    }

    .event-table-primary,
    .player-name {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    @media (max-width: 720px) {

      .topbar-inner,
      .subnav-inner {
        padding-left: 16px;
        padding-right: 16px;
      }

      .davinci-side {
        display: none;
      }

      .page {
        min-height: 100dvh;
      }

      .events-rule-grid {
        grid-template-columns: 1fr;
      }

      .event-about-header {
        flex-direction: column;
        align-items: stretch;
      }

      .event-row {
        grid-template-columns: 78px minmax(0, 1fr);
        gap: 12px;
      }

      .events-row-media {
        width: 78px;
      }

      .events-row-header {
        gap: 8px;
      }

      .events-row-header .events-list-meta {
        justify-content: flex-start;
        flex-basis: 100%;
      }

      .event-about-thumb {
        width: 72px;
        border-radius: 14px;
      }

      .event-map-scroll {
        height: 100%;
        min-height: 0;
      }

      .event-map-logo {
        width: 132px;
        max-height: 86px;
        top: 70px;
      }

      .event-map-scroll .back-to-europe {
        top: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="davinci-side left" aria-hidden="true"></div>
    <div class="davinci-side right" aria-hidden="true"></div>

    <div id="communityHeaderMount"></div>

    <main class="main-wrap events-view" aria-label="Events">
      <section class="panel content-card events-content" id="eventsListView" aria-label="Events list"></section>

      <div class="admin-layout event-shell is-hidden" id="eventDetailView">
        <nav class="panel menu-card" aria-label="Events menu">
          <div class="event-menu-logo" id="eventMenuLogoWrap">
            <img id="eventMenuLogo" alt="">
          </div>

    const getLocation = (event, locationId) => event.locations.find((location) => location.id === locationId) || event.locations[0];
    const getLocationQuests = (event, location) => event.quests.filter((quest) => {
      if (quest.locationId) return quest.locationId === location.id;
      return quest.region === location.title || quest.region === `${location.country} - ${location.title}`;
    });
    const formatEventDateTime = (value) => {
      const date = new Date(value.replace(" ", "T"));
      if (Number.isNaN(date.getTime())) return value;

      return new Intl.DateTimeFormat("en-US", {
        month: "long",
        day: "numeric",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    };
    const formatEventSchedule = (event) => `From ${formatEventDateTime(event.startTime)} to ${formatEventDateTime(event.endTime)}.`;
    const getQuestLocation = (event, quest) => {
      if (quest.locationId) {
        return event.locations.find((location) => location.id === quest.locationId) || null;
      }

      return event.locations.find((location) => location.quest === quest.title) || null;
    };
    const getLocationQuest = (event, location) => getLocationQuests(event, location)[0] || event.quests[0];
    const meta = (items) => `<span class="events-list-meta">${items.map((item) => `<span>${item}</span>`).join("")}</span>`;
    const buildPaginationModel = (totalPages, page) => {
      if (totalPages <= 5) {
        return Array.from({ length: totalPages }, (_, index) => index + 1);
      }

      if (page <= 3) {
        return [1, 2, 3, "...", totalPages];
      }

      if (page >= totalPages - 2) {
        return [1, "...", totalPages - 2, totalPages - 1, totalPages];
      }

      return [1, "...", page, "...", totalPages];
    };

      : '<span class="member-missing">No email</span>';

      ? name
      : '<span class="member-missing">No name</span>';

      if (player.name && player.name.trim()) return `${player.name} card image`;
      if (player.email && player.email.trim()) return `${player.email} card image`;
      return "Player card image";
    };
    const formatPlayerPoints = (points) => `${Number(points || 0)} points`;
    const rowMedia = (image, label) => image
      ? `<span class="events-row-media"><img src="${image}" alt="${label} image"></span>`
      : `<span class="events-row-media is-placeholder" aria-hidden="true">${eventsIcons.placeholder}</span>`;

      tag: "button",
      type: "button",
      label: "Join the event",
      variant: "contained",
      className: "event-join-button",
      attributes: {
        "data-join-event": event.id
      }
    });

      eventContentView.querySelectorAll("[data-join-event]").forEach((button) => {
        button.addEventListener("click", () => {
          button.textContent = "Joined";
          button.disabled = true;
        });
      });
    };
    const bindPlayersTable = (event) => {
      const playerSearch = eventContentView.querySelector("[data-event-player-search]");
      const playersTableBody = eventContentView.querySelector("[data-event-players-body]");
      const playersPagination = eventContentView.querySelector("[data-event-players-pagination]");
      if (!playerSearch || !playersTableBody || !playersPagination) return;

      const pageSize = 8;
      let currentPage = 1;

      const renderPlayersTable = () => {
        const query = playerSearch.value.trim().toLowerCase();
        const filteredPlayers = event.players.filter((player) =>
          (player.email || "").toLowerCase().includes(query) ||
          (player.name || "").toLowerCase().includes(query)
        );
        const totalPages = Math.max(1, Math.ceil(filteredPlayers.length / pageSize));

        if (currentPage > totalPages) {
          currentPage = totalPages;
        }

        const start = (currentPage - 1) * pageSize;
        const visiblePlayers = filteredPlayers.slice(start, start + pageSize);

        playersTableBody.innerHTML = visiblePlayers.length
          ? visiblePlayers.map((player) => `
            <div class="event-players-table-row">
              <img class="player-card-image" src="${player.image}" alt="${getPlayerCardAlt(player)}">
              <div class="event-player-email">${formatPlayerEmail(player.email)}</div>
              <div class="event-player-name"><span>${formatPlayerName(player.name)}</span></div>
              <div class="event-player-points">${formatPlayerPoints(player.points)}</div>
            </div>
          `).join("")
          : '<div class="event-table-empty">No players match the current search.</div>';

        const paginationModel = buildPaginationModel(totalPages, currentPage);
        playersPagination.innerHTML = `
          <button class="pagination-btn" type="button" data-page-nav="prev" ${currentPage === 1 ? "disabled" : ""}>Previous</button>
          ${paginationModel.map((item) => item === "..."
            ? '<span class="pagination-dots">...</span>'
            : `<button class="pagination-page ${item === currentPage ? "active" : ""}" type="button" data-page="${item}">${item}</button>`
          ).join("")}
          <button class="pagination-btn" type="button" data-page-nav="next" ${currentPage === totalPages ? "disabled" : ""}>Next</button>
        `;
      };

      playerSearch.addEventListener("input", () => {
        currentPage = 1;
        renderPlayersTable();
      });

      playersPagination.addEventListener("click", (eventClick) => {
        const pageButton = eventClick.target.closest("[data-page]");
        const navButton = eventClick.target.closest("[data-page-nav]");

        if (pageButton) {
          currentPage = Number(pageButton.dataset.page);
          renderPlayersTable();
          return;
        }

        if (navButton) {
          currentPage += navButton.dataset.pageNav === "next" ? 1 : -1;
          renderPlayersTable();
        }
      });

      renderPlayersTable();
    };

      const key = country.toLowerCase();
      if (key === "hungary") return "hungary";

          </aside>
        </div>
      </div>
    `;

    const setViewMode = (mode) => {
      eventsListView.classList.toggle("is-hidden", mode !== "list");
      eventDetailView.classList.toggle("is-hidden", mode !== "detail");
    };

    const setMapScreenMode = (enabled) => {
      document.querySelector(".events-view")?.classList.toggle("is-map-screen", enabled);
      eventDetailView.classList.toggle("is-map-screen", enabled);
      eventContentView.classList.toggle("is-map-screen", enabled);
    };

    const renderEventTabs = (event, activeTab) => {
      [
        { id: "about", label: "About", icon: eventsIcons.about },
        { id: "quests", label: "Quests", icon: eventsIcons.quests },
        { id: "players", label: "Players", icon: eventsIcons.players },
        { id: "locations", label: "Locations", icon: eventsIcons.locations }
      ].forEach((tab) => {
        const mount = document.getElementById(`events${tab.label}TabMount`);
        mount.innerHTML = DavinciCTAButton.render({
          tag: "button",
          type: "button",
          label: tab.label,
          variant: "text",
          icon: tab.icon,
          className: `menu-item events-menu-item${tab.id === activeTab ? " is-active" : ""}`,
          attributes: { "data-event-tab": tab.id }
        });
        mount.querySelector("button")?.addEventListener("click", () => {
          window.location.hash = `event/${event.id}/${tab.id}`;
        });
      });
    };

    const renderEventsList = () => {
      setViewMode("list");
      setMapScreenMode(false);
      eventsListView.innerHTML = `
        <div class="content-heading">
          <div>
            <h1>Events</h1>
            <p>Choose an event to open its details, quests, and locations.</p>
          </div>
        </div>
        <div class="events-list">
          ${eventData.map((event) => `
            <button class="event-row" type="button" data-event-id="${event.id}">
              ${rowMedia(event.image || event.logo, event.title)}
              <span class="events-row-body">
                <span class="events-row-header">
                  <strong>${event.title}</strong>
                  ${meta([`${event.quests.length} quests`])}
                </span>
                <span class="events-row-copy">${event.summary}</span>
                ${meta([`Starts ${event.startTime}`, `Ends ${event.endTime}`])}
              </span>
            </button>
          `).join("")}
        </div>
      `;

      eventsListView.querySelectorAll("[data-event-id]").forEach((row) => {
        row.addEventListener("click", () => {
          window.location.hash = `event/${row.dataset.eventId}/about`;
        });
      });
    };

    const renderAbout = (event) => `
      <article class="events-panel is-active">
        <div class="event-about-panel">
          <div class="event-about-header">
            <div class="event-about-copy">
              <h1>${event.title}</h1>
              <p>${event.about} ${formatEventSchedule(event)}</p>
              <div class="event-about-schedule" aria-label="Event schedule">
                <span>Start: ${formatEventDateTime(event.startTime)}</span>
                <span>End: ${formatEventDateTime(event.endTime)}</span>
              </div>
            </div>
            <div>
              ${renderJoinEventButton(event)}
            </div>
          </div>
          <div class="event-about-gallery">
            <div class="event-about-hero">
              <img src="${(event.gallery && event.gallery[0]) || event.logo || "./assets/image.png"}" alt="${event.title} hero image">
            </div>
            <div class="event-about-thumbs" aria-label="Event gallery">
              ${(event.gallery && event.gallery.length ? event.gallery.slice(1, 5) : [event.logo || "./assets/image.png"]).map((image, index) => `
                <div class="event-about-thumb">
                  <img src="${image}" alt="${event.title} gallery image ${index + 1}">
                </div>
              `).join("")}
            </div>
          </div>
        </div>
      </article>
    `;

    const renderQuests = (event) => `
      <article class="events-panel is-active">
        <div class="content-heading">
          <div>
            <h2>Quests</h2>
            <p>Choose a quest to open the task and completion details.</p>
          </div>
        </div>
        <div class="event-table-scroll" aria-label="Scrollable quests table">
          <section class="event-table quests-table" aria-label="Quests table">
            <div class="event-table-head" aria-hidden="true">
              <span>Quest</span>
              <span>Location</span>
              <span>Reward</span>
              <span>Status</span>
            </div>
            <div class="event-table-body">
              ${event.quests.map((quest) => `
                <button class="event-table-row is-clickable" type="button" data-quest-id="${quest.id}">
                  <div class="event-table-primary"><span>${quest.title}</span></div>
                  <div class="event-table-text">${getQuestLocation(event, quest)?.title || quest.region}</div>
                  <div class="event-table-text">${quest.reward}</div>
                  <div class="event-table-text">${quest.status}</div>
                </button>
              `).join("")}
            </div>
          </section>
        </div>
      </article>
    `;

    const renderPlayers = (event) => `
      <article class="events-panel is-active">
        <div class="content-heading">
          <div>
            <h2>Players</h2>
            <p>Search players by email or name and review their current points.</p>
          </div>
          ${renderJoinEventButton(event)}
        </div>
        <div class="search-row">
          <label class="search-shell" for="eventPlayerSearch">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="m20 20-3.5-3.5"></path>
            </svg>
            <input id="eventPlayerSearch" data-event-player-search type="search" placeholder="Search by email or name">
          </label>
        </div>
        <div class="event-table-scroll" aria-label="Scrollable players table">
          <section class="event-players-table" aria-label="Players table">
            <div class="event-players-table-head" aria-hidden="true">
              <span>Card</span>
              <span>Email</span>
              <span>Name</span>
              <span>Points</span>
            </div>
            <div class="event-players-table-body" data-event-players-body></div>
          </section>
        </div>
        <nav class="pagination" aria-label="Players pagination" data-event-players-pagination></nav>
      </article>
    `;

    const renderLocations = (event) => `
      <article class="events-panel is-active">
        <div class="content-heading">
          <div>
            <h2>Locations</h2>
            <p>Open a location to switch between its quest list and map view.</p>
          </div>
        </div>
        <div class="event-table-scroll" aria-label="Scrollable locations table">
          <section class="event-table locations-table" aria-label="Locations table">
            <div class="event-table-head" aria-hidden="true">
              <span>Location</span>
              <span>Quests</span>
            </div>
            <div class="event-table-body">
              ${event.locations.map((location) => `
                <button class="event-table-row is-clickable" type="button" data-location-id="${location.id}">
                  <div class="event-table-primary"><span>${location.title}</span></div>
                  <div class="event-table-text">${getLocationQuests(event, location).length}</div>
                </button>
              `).join("")}
            </div>
          </section>
        </div>
      </article>
    `;

    const renderLocationDetail = (event, location, view = "list") => {
      const quests = getLocationQuests(event, location);
      const tabs = [
        { id: "list", label: "List" },
        { id: "map", label: "Map" }
      ];

      return `
        <article class="events-panel is-active">
          ${DavinciCTAButton.render({
            tag: "button",
            type: "button",
            label: "Back to locations",
            variant: "text",
            className: "events-back",
            xPadding: "0px",
            color: "var(--text-muted)",
            hoverColor: "var(--text-muted)",
            hoverBackground: "transparent",
            icon: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"></path></svg>',
            attributes: {
              "data-back-to-locations": "true"
            }
          })}
          <div class="location-detail-panel">
            <div class="content-heading">
              <div>
                <h2>${location.title}</h2>
                <p>${location.copy}</p>
              </div>
            </div>
            <div class="location-detail-tabs" role="tablist" aria-label="Location views">
              ${tabs.map((tab) => `
                <button
                  class="location-detail-tab${tab.id === view ? " is-active" : ""}"
                  type="button"
                  role="tab"
                  aria-selected="${tab.id === view ? "true" : "false"}"
                  data-location-view="${tab.id}"
                >${tab.label}</button>
              `).join("")}
            </div>
            ${quests.length ? `
              <div class="event-table-scroll" aria-label="Scrollable location quests table">
                <section class="event-table location-detail-quests-table" aria-label="Location quests table">
                  <div class="event-table-head" aria-hidden="true">
                    <span>Quest</span>
                    <span>Reward</span>
                    <span>Status</span>
                  </div>
                  <div class="event-table-body">
                    ${quests.map((quest) => `
                      <button class="event-table-row is-clickable" type="button" data-location-quest-id="${quest.id}">
                        <div class="event-table-primary"><span>${quest.title}</span></div>
                        <div class="event-table-text">${quest.reward}</div>
                        <div class="event-table-text">${quest.status}</div>
                      </button>
                    `).join("")}
                  </div>
                </section>
              </div>
            ` : `
              <div class="events-list-item">
                <strong>No quests yet</strong>
                <p>No quest is currently assigned to this location.</p>
              </div>
            `}
          </div>
        </article>
      `;
    };

    const renderLocationMap = (event, location) => `
      <article class="events-panel is-active event-map-shell">
        ${renderCommunityMap(event, location)}
      </article>
    `;

    const renderQuestDetail = (event, quest) => `
      <article class="events-panel is-active">
        ${DavinciCTAButton.render({
          tag: "button",
          type: "button",
          label: "Back to quests",
          variant: "text",
          className: "events-back",
          xPadding: "0px",
          color: "var(--text-muted)",
          hoverColor: "var(--text-muted)",
          hoverBackground: "transparent",
          icon: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"></path></svg>',
          attributes: {
            "data-back-to-quests": "true"
          }
        })}
        <div class="quest-detail-topbar">
          <div class="content-heading">
            <div>
              <h2>${quest.title}</h2>
              <p>${quest.summary}</p>
            </div>
          </div>
        </div>
        <div class="events-rule-grid">
          <div class="events-rule">
            <strong>What to do</strong>
            <p>${quest.task}</p>
          </div>
          <div class="events-rule">
            <strong>Completion</strong>
            <p>${quest.completion}</p>
          </div>
        </div>
        <div class="events-list-item">
          <strong>Quest details</strong>
          ${meta([quest.region, quest.reward, quest.status])}
          ${renderQuestLocationLink(event, quest)}
        </div>
      </article>
    `;

    const renderEventDetail = (event, tab, detailId, subView) => {
      setViewMode("detail");
      const activeTab = ["about", "quests", "players", "locations"].includes(tab) ? tab : "about";
      setMapScreenMode(activeTab === "locations" && Boolean(detailId) && subView === "map");
      eventMenuTitle.textContent = event.title;
      eventMenuLogoWrap.classList.toggle("is-visible", Boolean(event.logo));
      if (event.logo) {
        eventMenuLogo.src = event.logo;
        eventMenuLogo.alt = `${event.title} logo`;
      } else {
        eventMenuLogo.removeAttribute("src");
        eventMenuLogo.alt = "";
      }
      renderEventTabs(event, activeTab === "quests" && detailId ? "quests" : activeTab);

      if (activeTab === "quests" && detailId) {
        const quest = getQuest(event, detailId);
        eventContentView.innerHTML = renderQuestDetail(event, quest);
        eventContentView.querySelector("[data-back-to-quests]")?.addEventListener("click", () => {
          window.location.hash = `event/${event.id}/quests`;
        });
        eventContentView.querySelector("[data-quest-location-id]")?.addEventListener("click", (clickEvent) => {
          window.location.hash = `event/${event.id}/locations/${clickEvent.currentTarget.dataset.questLocationId}/map`;
        });
        return;
      }

      if (activeTab === "quests") {
        eventContentView.innerHTML = renderQuests(event);
        eventContentView.querySelectorAll("[data-quest-id]").forEach((row) => {
          row.addEventListener("click", () => {
            window.location.hash = `event/${event.id}/quests/${row.dataset.questId}`;
          });
        });
        return;
      }

      if (activeTab === "players") {
        eventContentView.innerHTML = renderPlayers(event);
        bindJoinEventAction();
        bindPlayersTable(event);
        return;
      }

      if (activeTab === "locations") {
        if (detailId) {
          const location = getLocation(event, detailId);
          const locationView = subView === "map" ? "map" : "list";

          if (locationView === "map") {
            eventContentView.innerHTML = renderLocationMap(event, location);
            eventContentView.querySelector("[data-back-to-locations]")?.addEventListener("click", () => {
              window.location.hash = `event/${event.id}/locations/${location.id}`;
            });
            DavinciCommunityMap.init(eventContentView);
            return;
          }

          eventContentView.innerHTML = renderLocationDetail(event, location, locationView);
          eventContentView.querySelector("[data-back-to-locations]")?.addEventListener("click", () => {
            window.location.hash = `event/${event.id}/locations`;
          });
          eventContentView.querySelectorAll("[data-location-view]").forEach((button) => {
            button.addEventListener("click", () => {
              const nextView = button.dataset.locationView;
              window.location.hash = nextView === "map"
                ? `event/${event.id}/locations/${location.id}/map`
                : `event/${event.id}/locations/${location.id}`;
            });
          });
          eventContentView.querySelectorAll("[data-location-quest-id]").forEach((row) => {
            row.addEventListener("click", () => {
              window.location.hash = `event/${event.id}/quests/${row.dataset.locationQuestId}`;
            });
          });
          return;
        }

        eventContentView.innerHTML = renderLocations(event);
        eventContentView.querySelectorAll("[data-location-id]").forEach((row) => {
          row.addEventListener("click", () => {
            window.location.hash = `event/${event.id}/locations/${row.dataset.locationId}`;
          });
        });
        return;
      }

      eventContentView.innerHTML = renderAbout(event);
      bindJoinEventAction();
    };

    const renderRoute = () => {
      const parts = window.location.hash.replace(/^#/, "").split("/").filter(Boolean);
      if (parts[0] !== "event") {
        renderEventsList();
        return;
      }

      const event = getEvent(parts[1]);
      renderEventDetail(event, parts[2] || "about", parts[3], parts[4]);
    };

    syncTopbarState();
    window.addEventListener("scroll", syncTopbarState, { passive: true });
    window.addEventListener("hashchange", renderRoute);
    renderRoute();
  </script>
</body>

</html>
